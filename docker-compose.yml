services:
  db:
    image: postgres:16-alpine
    container_name: toplanti-db
    environment:
      POSTGRES_USER: toplanti
      POSTGRES_PASSWORD: toplanti
      POSTGRES_DB: toplanti
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toplanti"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Yerel SMTP yakalayıcı: gerçek anahtar olmadan mail katmanını offline test et.
  # SMTP :1025 (backend buraya yollar) · Web arayüzü :8025 (gelen kutusunu gör).
  mailpit:
    image: axllent/mailpit:latest
    container_name: toplanti-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  pgdata:
