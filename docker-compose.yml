services:
  db:
    image: postgres:16-alpine
    container_name: toplanti-db
    environment:
      POSTGRES_USER: toplanti
      POSTGRES_PASSWORD: toplanti
      POSTGRES_DB: toplanti
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toplanti"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
