<!doctype html>
<html lang="tr">

    <title>meeting-to-mail</title>
    <script>
      // Tema flash'ını önle: render'dan önce kaydedilmiş temayı uygula (varsayılan: açık).
      (function () {
        try {
          var t = localStorage.getItem('m2m-theme') || 'light'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>
